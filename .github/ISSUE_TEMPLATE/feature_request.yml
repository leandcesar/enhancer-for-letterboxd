name: Feature request
description: Suggest a new feature for the extension
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve the extension? Share it here.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this feature solve?
      placeholder: I'm often trying to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other solutions you've considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, or references.