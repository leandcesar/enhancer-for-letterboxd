<!doctype html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width,initial-scale=1" />
   <title>Enhancer for Letterboxd</title>
   <meta name="description"
      content="Enhances the Letterboxd experience with additional features. Install the Chrome extension." />
   <meta name="robots" content="index,follow" />
   <link rel="canonical" href="https://enhancer-for-letterboxd.vercel.app/" />
   <meta name="theme-color" content="#14181c" />
   <meta name="color-scheme" content="dark" />
   <link rel="icon" href="https://enhancer-for-letterboxd.vercel.app/assets/icon.png" />
   <link rel="apple-touch-icon" href="https://enhancer-for-letterboxd.vercel.app/assets/icon.png" />
   <link rel="preload" as="image" href="https://enhancer-for-letterboxd.vercel.app/assets/logo.png" />

   <style>
      :root {
         --black: #000;
         --white: #fff;
         --green: #00e054;
         --green-hover: #00c84c;
         --blue: #40bcf4;
         --bg: #14181c;
         --footer: #2c3440;
         --footer-text: #99aabb;
         --footer-text-hover: #d0dae3;
         --footer-muted: #6e7c8c;
      }

      *,
      *:before,
      *:after {
         box-sizing: border-box;
         margin: 0;
      }

      html,
      body {
         height: 100%;
      }

      body {
         min-height: 100vh;
         display: flex;
         flex-direction: column;
         font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         color: var(--white);
         background: var(--bg) url("https://enhancer-for-letterboxd.vercel.app/assets/background.webp") repeat-x 0 -1px;
      }

      main {
         flex: 1;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         gap: 40px;
         text-align: center;
         padding: 40px 20px;
      }

      .logo {
         max-width: 80%;
         height: auto;
         filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.15));
      }

      .install {
         display: flex;
         align-items: center;
         gap: 10px;
         padding: 14px 26px;
         background: var(--green);
         color: var(--white);
         font-size: 15px;
         font-weight: 700;
         border-radius: 8px;
         text-decoration: none;
         transition:
            transform 0.15s ease,
            box-shadow 0.15s ease,
            background 0.15s ease;
         box-shadow: 0 8px 24px rgba(0, 224, 84, 0.35);
      }

      .install:hover {
         background: var(--green-hover);
         transform: translateY(-2px);
         box-shadow: 0 12px 32px rgba(0, 224, 84, 0.45);
      }

      .install:focus-visible {
         outline: 3px solid var(--blue);
         outline-offset: 3px;
      }

      .install img,
      .browsers img {
         width: 22px;
         height: 22px;
      }

      .browsers {
         display: flex;
         gap: 16px;
         font-size: 14px;
         opacity: 0.75;
      }

      .browsers span {
         opacity: 0.6;
      }

      .browsers img {
         filter: grayscale(1) brightness(0.8) opacity(0.8);
         transition: opacity 0.2s ease;
      }

      .browsers img:hover {
         opacity: 1;
      }

      footer {
         width: 100%;
         padding: 32px 0;
         background: var(--footer);
         border-top: 1px solid rgba(255, 255, 255, 0.05);
         color: var(--footer-text);
      }

      .footer-wrap {
         width: 950px;
         max-width: calc(100% - 40px);
         margin: 0 auto;
         display: flex;
         flex-wrap: wrap;
         justify-content: space-between;
         align-items: flex-start;
      }

      .footer-nav {
         display: flex;
         align-items: center;
         gap: 18px;
         font-size: 15px;
         font-weight: 700;
      }

      footer a,
      footer button {
         font: inherit;
         color: var(--footer-text);
         text-decoration: none;
         background: none;
         border: 0;
         cursor: pointer;
         transition: color 0.15s ease;
      }

      footer a:hover,
      footer button:hover {
         color: var(--footer-text-hover);
      }

      footer button {
         padding: 0;
      }

      .copyright {
         width: 100%;
         margin-top: 10px;
         font-size: 12px;
         color: var(--footer-muted);
      }

      .copyright a {
         color: var(--footer-muted);
         text-decoration: underline;
      }

      .copyright a:hover {
         color: var(--footer-text-hover);
      }

      .skip {
         position: absolute;
         top: -40px;
         left: 0;
         background: var(--green);
         color: var(--black);
         padding: 8px 14px;
         border-radius: 6px;
         font-weight: 600;
      }

      .skip:focus {
         top: 10px;
         left: 10px;
      }

      .sr {
         position: absolute;
         width: 1px;
         height: 1px;
         overflow: hidden;
         clip: rect(0, 0, 0, 0);
      }

      @media (prefers-reduced-motion: reduce) {
         * {
            transition: none !important;
         }
      }
   </style>
</head>

<body>
   <a href="#main" class="skip">Skip to content</a>

   <main id="main">
      <h1 class="sr">Enhancer for Letterboxd</h1>

      <img src="https://enhancer-for-letterboxd.vercel.app/assets/logo.png" class="logo" alt="Enhancer for Letterboxd"
         decoding="async" />

      <a class="install" href="https://chromewebstore.google.com/detail/abkbjnimmidipmhhhlcnikkifjpdjdpc"
         target="_blank" rel="noopener noreferrer">
         <img src="https://enhancer-for-letterboxd.vercel.app/icons/chrome.svg" alt="" aria-hidden="true" />

         Install for Chrome
      </a>

      <div class="browsers">
         <span>Coming soon</span>

         <img src="https://enhancer-for-letterboxd.vercel.app/icons/firefox.svg" alt="" loading="lazy" decoding="async"
            aria-hidden="true" />
         <img src="https://enhancer-for-letterboxd.vercel.app/icons/opera.svg" alt="" loading="lazy" decoding="async"
            aria-hidden="true" />
         <img src="https://enhancer-for-letterboxd.vercel.app/icons/safari.svg" alt="" loading="lazy" decoding="async"
            aria-hidden="true" />
      </div>
   </main>

   <footer>
      <div class="footer-wrap">
         <nav class="footer-nav" aria-label="Footer">
            <a href="https://github.com/leandcesar/enhancer-for-letterboxd/issues" target="_blank"
               rel="noopener noreferrer">
               Feedback
            </a>

            <a href="https://github.com/leandcesar/enhancer-for-letterboxd/releases" target="_blank"
               rel="noopener noreferrer">
               Changelog
            </a>

            <a href="https://buymeacoffee.com/leandcesar" target="_blank" rel="noopener noreferrer">
               Donate
            </a>

            <button id="share" aria-label="Share this page">Share</button>
         </nav>

         <p class="copyright">
            Made by
            <a href="https://linktr.ee/leandcesar" target="_blank" rel="noopener noreferrer">
               @leandcesar
            </a>
         </p>
      </div>
   </footer>

   <script>
      const shareBtn = document.getElementById("share");

      shareBtn?.addEventListener("click", async () => {
         const url = location.href;

         if (navigator.share) {
            try {
               await navigator.share({
                  title: document.title,
                  text: "Enhance the Letterboxd experience with additional features.",
                  url,
               });
            } catch { }
            return;
         }

         navigator.clipboard?.writeText(url);
      });
   </script>
</body>

</html>
