<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Enhancer for Letterboxd</title>

    <meta name="description" content="Enhances the Letterboxd experience with additional features." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://enhancer-for-letterboxd.vercel.app/" />

    <meta name="theme-color" content="#14181c" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="preconnect" href="https://enhancer-for-letterboxd.vercel.app" />
    <link rel="preconnect" href="https://chromewebstore.google.com" />
    <link rel="preconnect" href="https://addons.mozilla.org" />

    <link rel="icon" href="https://enhancer-for-letterboxd.vercel.app/assets/images/icon.png" />
    <link rel="apple-touch-icon" href="https://enhancer-for-letterboxd.vercel.app/assets/images/icon.png" />

    <link rel="preload" as="image" href="https://enhancer-for-letterboxd.vercel.app/assets/images/logo.png"
        fetchpriority="high" />

    <link rel="preload" href="style.css" as="style" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <a href="#main" class="skip">Skip to content</a>

    <main id="main">
        <h1 class="sr">Enhancer for Letterboxd</h1>

        <img src="https://enhancer-for-letterboxd.vercel.app/assets/images/logo.png" class="logo" alt="Enhancer for Letterboxd"
            decoding="async" fetchpriority="high" width="200" height="200" />

        <div class="install-buttons" id="install-buttons">
            <a id="btn-chrome" class="install"
                href="https://chromewebstore.google.com/detail/abkbjnimmidipmhhhlcnikkifjpdjdpc" target="_blank"
                rel="noopener noreferrer">
                <img src="https://enhancer-for-letterboxd.vercel.app/assets/icons/chrome.svg" alt="" role="presentation"
                    width="24" height="24" decoding="async" />
                Install for Chrome
            </a>

            <a id="btn-firefox" class="install"
                href="https://addons.mozilla.org/pt-BR/firefox/addon/enhancer-for-letterboxd/" target="_blank"
                rel="noopener noreferrer">
                <img src="https://enhancer-for-letterboxd.vercel.app/assets/icons/firefox.svg" alt="" role="presentation"
                    width="24" height="24" decoding="async" />
                Install for Firefox
            </a>
        </div>

        <div class="browsers" aria-hidden="true">
            <span>Coming soon</span>

            <img src="https://enhancer-for-letterboxd.vercel.app/assets/icons/opera.svg" alt="" role="presentation"
                loading="lazy" decoding="async" width="24" height="24" />

            <img src="https://enhancer-for-letterboxd.vercel.app/assets/icons/safari.svg" alt="" role="presentation"
                loading="lazy" decoding="async" width="24" height="24" />
        </div>
    </main>

    <footer>
        <div class="footer-wrap">
            <nav class="footer-nav" aria-label="Footer">
                <a href="/">Home</a>
                <a href="/features">Features</a>
                <a href="/changelog">Changelog</a>
                <a href="https://github.com/leandcesar/enhancer-for-letterboxd/issues?q=is%3Aissue" target="_blank"
                    rel="noopener noreferrer">Feedback</a>
                <!-- <a href="https://buymeacoffee.com/leandcesar" target="_blank" rel="noopener noreferrer">Donate</a> -->
                <button id="share" aria-label="Share this page" type="button">Share</button>
            </nav>

            <p class="copyright">
                Made by
                <a href="https://github.com/leandcesar/" target="_blank" rel="noopener noreferrer">@leandcesar</a>
            </p>
        </div>
    </footer>

    <script defer>
        const shareBtn = document.getElementById("share");

        shareBtn?.addEventListener("click", async () => {
            const url = location.href;
            const text = "Enhance the Letterboxd experience with additional features.";

            if (navigator.share) {
                try {
                    await navigator.share({ title: document.title, text, url });
                    return;
                } catch { }
            }

            window.open(
                `https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,
                "_blank",
                "noopener,noreferrer"
            );
        });

        const chromeBtn = document.getElementById("btn-chrome");
        const firefoxBtn = document.getElementById("btn-firefox");
        const container = document.getElementById("install-buttons");

        if (chromeBtn && firefoxBtn && container) {
            const isFirefox = navigator.userAgent.includes("Firefox");
            const recommended = isFirefox ? firefoxBtn : chromeBtn;

            recommended.classList.add("recommended");

            if (container.firstElementChild !== recommended) {
                container.prepend(recommended);
            }
        }
    </script>
</body>

</html>
